<script>
/* Base64 seguro — NÃO EXIBE NÚMERO */
const encoded = "bWV1IHRlbGVncmFtIEBNYXJjYWRlUG9tYmFnaXJhCm1ldSB3aGF0c2FwcCA1NSAxMSA5IDg4NDMgNDA3MA==";

function getData() {
    const decoded = atob(encoded);

    const telegramMatch = decoded.match(/@([\w]+)/);
    const phoneMatch = decoded.match(/\d+/g);

    const telegram = telegramMatch ? telegramMatch[1] : null;
    const phone = phoneMatch ? phoneMatch.join("") : null;

    return { telegram, phone };
}

function openWhatsApp() {
    const { phone } = getData();
    if (phone) {
        window.open("https://wa.me/" + phone, "_blank");
    }
}

function openTelegram() {
    const { telegram } = getData();
    if (telegram) {
        window.open("https://t.me/" + telegram, "_blank");
    }
}
</script>
