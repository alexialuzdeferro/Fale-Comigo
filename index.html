<style>

/* ===============================
   FIX ABSOLUTO DO BUG DE MOBILE
   =============================== */
*,
*::before,
*::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 12px;
    overflow-x: hidden !important;

    background: url('https://raw.githubusercontent.com/pombagiras/melusine-oficial/refs/heads/main/Ale%20Red%20(2).jpg')
        center/cover no-repeat fixed;

    font-family: "Montserrat", sans-serif;
    color: #fff;
}

/* CONTAINER MOBILE-FIRST */
.container {
    width: 100%;
    max-width: 100%;
    margin: 30px auto;
    padding: 20px;

    background: rgba(255, 0, 80, 0.10);
    backdrop-filter: blur(15px);

    border-radius: 18px;
    border: 1px solid rgba(255, 0, 80, 0.25);

    text-align: center;
    overflow: hidden;
}

/* Garantir que imagem nunca ultrapasse a tela */
img {
    max-width: 100%;
    display: block;
}

/* Banner */
.banner {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 25px;
    box-shadow: 0 0 25px rgba(255, 20, 90, 0.5);
}

/* Títulos */
h1 {
    font-size: 32px;
    font-weight: 800;
    margin: 0;
    letter-spacing: 1px;
    text-shadow: 0 0 12px #ff0055;
}

p.sub {
    opacity: .85;
    margin-bottom: 25px;
}

/* Botões mobile-friendly */
.btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    margin: 10px 0;

    background: linear-gradient(90deg, #ff004c, #d4003d);
    color: #fff;

    text-decoration: none;
    display: block;

    font-weight: 700;
    font-size: 16px;
    border: none;
    cursor: pointer;

    box-shadow: 0 0 12px rgba(255, 0, 80, .45);

    transition: .2s ease-in-out;
}

.btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 18px rgba(255, 0, 80, .75);
}

</style>

<script>
/* ===============================
   DECODIFICAÇÃO SEGURA DO CONTATO
   =============================== */
const encoded = "bWV1IHRlbGVncmFtIEBNYXJjYWRlUG9tYmFnaXJhCm1ldSB3aGF0c2FwcCA1NSAxMSA5IDg4NDMgNDA3MA==";

function getData() {
    const decoded = atob(encoded);

    const telegramMatch = decoded.match(/@([\w]+)/);
    const phoneMatch = decoded.match(/\d+/g);

    const telegram = telegramMatch ? telegramMatch[1] : null;
    const phone = phoneMatch ? phoneMatch.join("") : null;

    return { telegram, phone };
}

function openWhatsApp() {
    const { phone } = getData();
    if (phone) {
        window.open("https://wa.me/" + phone, "_blank");
    } else {
        alert("Erro ao abrir WhatsApp");
    }
}

function openTelegram() {
    const { telegram } = getData();
    if (telegram) {
        window.open("https://t.me/" + telegram, "_blank");
    } else {
        alert("Erro ao abrir Telegram");
    }
}
</script>

<div class="container">

    <button class="btn" onclick="openWhatsApp()"> ➭ WHATSAPP</button>
    <button class="btn" onclick="openTelegram()"> ➭ TELEGRAM</button>
</div>
